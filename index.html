<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WorldTime">
<title>WorldTime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --blue: #003D5B;
  --jade: #007380;
  --teal: #25E2CC;
  --pink: #CC3262;
  --orange: #FF8400;
  --yellow: #FBCA18;
  --charcoal: #2A2B2C;
  --gray-bg: #F2F2F2;
  --white: #FFFFFF;
  --border: #D0D5DC;
  --border-light: #E5E8ED;
  --muted: #6B7280;
  --left-w: 170px;
  --cell-w: 54px;
  --cell-h: 48px;
  --hdr-h: 50px;
}
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Montserrat', sans-serif; background: var(--gray-bg); color: var(--charcoal); display: flex; flex-direction: column; }

/* ── TOP BAR ── */
.topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px; height: 52px;
  padding-top: env(safe-area-inset-top);
  height: calc(52px + env(safe-area-inset-top));
  background: var(--blue); flex-shrink: 0; z-index: 60;
}
.logo { font-weight: 800; font-size: 16px; color: var(--teal); flex-shrink: 0; letter-spacing: -0.3px; }
.logo span { color: var(--white); }

.search-wrap { flex: 1; position: relative; }
.search-wrap input {
  width: 100%; background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.25);
  border-radius: 8px; padding: 8px 12px 8px 30px;
  font-family: 'Montserrat', sans-serif; font-size: 13px; color: var(--white); outline: none;
  transition: border-color .15s, background .15s;
}
.search-wrap input:focus { border-color: var(--teal); background: rgba(255,255,255,0.18); }
.search-wrap input::placeholder { color: rgba(255,255,255,0.5); }
.si-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); font-size: 15px; pointer-events: none; font-weight: 700; }

.dropdown {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: var(--white); border: 1px solid var(--border); border-radius: 10px;
  box-shadow: 0 8px 28px rgba(0,0,0,.18); z-index: 400; max-height: 280px; overflow-y: auto; display: none;
}
.dropdown.open { display: block; }
.drop-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  cursor: pointer; border-bottom: 1px solid var(--border-light); transition: background .1s;
}
.drop-item:last-child { border-bottom: none; }
.drop-item:hover { background: var(--gray-bg); }
.drop-flag { font-size: 20px; }
.drop-name { font-size: 13px; font-weight: 700; color: var(--charcoal); }
.drop-country { font-size: 11px; color: var(--muted); margin-top: 1px; }

/* Topbar controls */
.tb-ctrl {
  background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--white); border-radius: 8px; padding: 6px 11px;
  font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700;
  cursor: pointer; flex-shrink: 0; white-space: nowrap; transition: background .15s, border-color .15s;
  letter-spacing: 0.3px;
}
.tb-ctrl:hover { background: rgba(255,255,255,0.2); }
.tb-ctrl.active { background: var(--teal); border-color: var(--teal); color: var(--blue); }

/* Office hours picker (hidden by default, shown when OH active) */
.oh-picker {
  display: none; align-items: center; gap: 4px;
  background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 8px; padding: 4px 8px; flex-shrink: 0;
}
.oh-picker.open { display: flex; }
.oh-picker label { font-size: 10px; color: rgba(255,255,255,0.6); font-weight: 600; }
.oh-picker select {
  background: transparent; border: none; color: var(--white);
  font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500;
  outline: none; cursor: pointer; padding: 0 2px;
}
.oh-picker select option { background: var(--blue); color: var(--white); }

/* Views button */
.views-btn {
  background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.25);
  color: var(--white); border-radius: 8px; padding: 7px 12px;
  font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer; flex-shrink: 0; white-space: nowrap; transition: background .15s;
}
.views-btn:hover { background: rgba(255,255,255,0.2); }

/* ── VIEWS BAR ── */
.views-bar {
  background: var(--blue); border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; gap: 6px; padding: 0 14px 8px;
  flex-shrink: 0; flex-wrap: wrap; display: none;
}
.views-bar.open { display: flex; }
.view-chip {
  display: flex; align-items: center; gap: 0;
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px; overflow: hidden; cursor: pointer;
}
.view-chip-name {
  padding: 5px 10px; font-size: 11px; font-weight: 600; color: var(--white);
  transition: background .1s;
}
.view-chip-name:hover { background: rgba(255,255,255,0.15); }
.view-chip-name.active-view { background: var(--jade); border-right: 1px solid rgba(255,255,255,0.15); }
.view-chip-del { padding: 5px 7px; font-size: 14px; color: rgba(255,255,255,0.5); transition: color .1s; }
.view-chip-del:hover { color: var(--pink); }
.view-chip-link { padding: 5px 4px; font-size: 11px; color: rgba(255,255,255,0.4); transition: color .1s; cursor: pointer; }
.view-chip-link:hover { color: var(--teal); }
.copy-toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--charcoal); color: var(--white);
  padding: 8px 18px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  pointer-events: none; opacity: 0;
  transition: opacity .2s; z-index: 999;
}
.save-view-btn {
  background: var(--teal); color: var(--blue); border: none;
  border-radius: 6px; padding: 5px 12px;
  font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 700;
  cursor: pointer; transition: opacity .15s;
}
.save-view-btn:hover { opacity: .85; }



/* ── DATE NAV ── */
.date-nav {
  background: var(--white); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; flex-shrink: 0;
  overflow-x: auto; scrollbar-width: none;
  padding-left: var(--left-w);
}
.date-nav::-webkit-scrollbar { display: none; }
.date-nav-inner { display: flex; gap: 2px; padding: 7px 12px; }
.date-pill {
  padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  cursor: pointer; white-space: nowrap; color: var(--muted); border: none; background: none;
  line-height: 1.3; text-align: center; transition: background .1s, color .1s;
}
.date-pill:hover { background: var(--gray-bg); color: var(--charcoal); }
.date-pill.active { background: var(--blue); color: var(--white); }
.date-pill.is-weekend:not(.active) { color: var(--pink); }

/* ── GRID ── */
.grid-area { flex: 1; overflow: hidden; }
.grid-scroll { width: 100%; height: 100%; overflow: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.grid-scroll::-webkit-scrollbar { height: 5px; width: 5px; }
.grid-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.gtable { border-collapse: collapse; min-width: max-content; }

/* Corner */
.corner-cell {
  position: sticky; left: 0; top: 0; z-index: 40;
  background: var(--blue); border-right: 2px solid var(--jade); border-bottom: 2px solid var(--border);
  width: var(--left-w); min-width: var(--left-w); max-width: var(--left-w); height: var(--hdr-h);
  padding: 0 12px; vertical-align: middle;
}
.corner-label { font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1.2px; }

/* Hour header */
.hh-cell {
  position: sticky; top: 0; z-index: 20;
  width: var(--cell-w); min-width: var(--cell-w); max-width: var(--cell-w); height: var(--hdr-h);
  background: var(--white); border-bottom: 2px solid var(--border); border-right: 1px solid var(--border-light);
  text-align: center; vertical-align: middle;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted);
  cursor: pointer; user-select: none; transition: background .1s;
}
.hh-cell:hover { background: var(--gray-bg); }
.hh-cell.sel { background: var(--blue); color: var(--white); }
.hh-cell .hnum { font-size: 13px; font-weight: 500; display: block; line-height: 1.1; }
.hh-cell .hap { font-size: 9px; display: block; opacity: .75; }

/* City left */
.city-cell {
  position: sticky; left: 0; z-index: 15;
  width: var(--left-w); min-width: var(--left-w); max-width: var(--left-w);
  background: var(--white); border-right: 2px solid var(--jade); border-bottom: 1px solid var(--border);
  padding: 5px 10px; vertical-align: middle;
}
.city-top { display: flex; align-items: flex-start; justify-content: space-between; }
.cname { font-size: 12px; font-weight: 700; color: var(--blue); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; }
.ccountry { font-size: 9px; color: var(--muted); margin-top: 1px; }
.ctime { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; color: var(--jade); margin-top: 2px; }
.cdel { background: none; border: none; color: #ccc; font-size: 14px; cursor: pointer; padding: 0 1px; line-height: 1; flex-shrink: 0; }
.cdel:hover { color: var(--pink); }

/* Home city */
.city-cell.is-home { background: var(--blue); border-right-color: var(--teal); }
.city-cell.is-home .cname { color: var(--teal); }
.city-cell.is-home .ccountry { color: rgba(255,255,255,0.5); }
.city-cell.is-home .ctime { color: var(--white); }
.city-cell.is-home .cdel { color: rgba(255,255,255,0.3); }
.city-cell.is-home .cdel:hover { color: var(--pink); }
.chome-btn {
  background: none; border: none; cursor: pointer; padding: 0 1px;
  font-size: 11px; line-height: 1; flex-shrink: 0;
  opacity: 0.3; transition: opacity .15s;
}
.chome-btn:hover { opacity: 1; }
.chome-btn.active { opacity: 1; }
.home-tag {
  font-size: 7px; font-weight: 800; color: var(--teal);
  text-transform: uppercase; letter-spacing: 0.8px;
  display: inline-block; margin-left: 4px;
}
.hd-cell {
  width: var(--cell-w); min-width: var(--cell-w); max-width: var(--cell-w); height: var(--cell-h);
  text-align: center; vertical-align: middle;
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  border-right: 1px solid rgba(0,0,0,.04); border-bottom: 1px solid rgba(0,0,0,.04);
  cursor: pointer; user-select: none; position: relative; transition: filter .1s;
}
body.fmt24 .hd-cell .ch { font-size: 11px; }
body.fmt24 .hd-cell { font-size: 11px; }
.hd-cell:hover { filter: brightness(.93); }
.hd-cell .ch { font-weight: 500; display: block; line-height: 1.1; }
.hd-cell .ca { font-size: 9px; display: block; opacity: .65; }

/* 2-state cell colors: office hours vs off hours */
.h-off  { background: #cdd2dc; color: #4a5270; }
.h-work { background: #dff0ee; color: var(--jade); }

/* Weekend overlay */
.is-wk { background-image: repeating-linear-gradient(45deg, rgba(204,50,98,0.07) 0px, rgba(204,50,98,0.07) 2px, transparent 2px, transparent 8px) !important; }
.is-wk.hd-cell { border-bottom-color: rgba(204,50,98,0.12) !important; }

/* Bank holiday overlay */
.is-bh { background-image: repeating-linear-gradient(135deg, rgba(255,132,0,0.1) 0px, rgba(255,132,0,0.1) 2px, transparent 2px, transparent 8px) !important; }

/* Both weekend + holiday */
.is-wk.is-bh { background-image:
  repeating-linear-gradient(45deg, rgba(204,50,98,0.07) 0px, rgba(204,50,98,0.07) 2px, transparent 2px, transparent 8px),
  repeating-linear-gradient(135deg, rgba(255,132,0,0.1) 0px, rgba(255,132,0,0.1) 2px, transparent 2px, transparent 8px) !important; }

/* Selected */
.hd-cell.sel { background: var(--blue) !important; background-image: none !important; color: var(--white) !important; }
.hd-cell.sel .ca { opacity: .8; }

/* Day boundary — white gap */
.day-bd { border-left: 4px solid var(--gray-bg) !important; }
.day-tag-abs { position: absolute; top: 2px; left: 3px; font-size: 7px; font-weight: 700; color: var(--jade); line-height: 1; pointer-events: none; }

/* Cell badges */
.cell-badges { position: absolute; top: 2px; right: 2px; display: flex; gap: 1px; flex-direction: column; align-items: flex-end; }
.badge-wk { font-size: 7px; font-weight: 800; color: var(--pink); line-height: 1; }
.badge-bh { font-size: 6px; font-weight: 800; color: var(--orange); line-height: 1; background: rgba(255,132,0,0.15); padding: 1px 2px; border-radius: 2px; }

/* Empty */
.empty-hint { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 14px; line-height: 1.7; }
.empty-hint .ei { font-size: 32px; margin-bottom: 12px; }

/* Save modal */
.modal-backdrop { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,.45); display: none; align-items: center; justify-content: center; }
.modal-backdrop.open { display: flex; }
.modal { background: var(--white); border-radius: 14px; padding: 24px; width: 300px; box-shadow: 0 16px 40px rgba(0,0,0,.25); }
.modal h3 { font-size: 16px; font-weight: 700; color: var(--blue); margin-bottom: 14px; }
.modal input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-family: 'Montserrat', sans-serif; font-size: 14px; outline: none;
  transition: border-color .15s; margin-bottom: 14px;
}
.modal input:focus { border-color: var(--blue); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel { background: none; border: 1.5px solid var(--border); color: var(--muted); border-radius: 8px; padding: 8px 16px; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-save { background: var(--blue); color: var(--white); border: none; border-radius: 8px; padding: 8px 16px; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }

.bottom-safe { flex-shrink: 0; height: env(safe-area-inset-bottom); background: var(--white); }
</style>
</head>

<div class="topbar">
  <div class="logo">world<span>time</span></div>
  <div class="search-wrap">
    <span class="si-icon">+</span>
    <input id="si" type="text" placeholder="+ Add city or timezone" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="dropdown" id="dd"></div>
  </div>
  <button class="tb-ctrl" id="fmtToggle">12h</button>

  </div>
  <button class="views-btn" id="viewsToggle">📋 Views</button>
</div>

<div class="views-bar" id="viewsBar">
  <button class="save-view-btn" id="saveViewBtn">＋ Save current view</button>
  <span id="viewChips"></span>
</div>



<div class="date-nav" id="dateNav">
  <div class="date-nav-inner" id="dateNavInner"></div>
</div>

<div class="grid-area">
  <div class="grid-scroll" id="gs">
    <table class="gtable" id="gt"></table>
  </div>
</div>

<div class="copy-toast" id="copyToast">🔗 Link copiato!</div>

<div class="bottom-safe"></div>

<!-- Save View Modal -->
<div class="modal-backdrop" id="modalBg">
  <div class="modal">
    <h3>Save this view</h3>
    <input id="viewNameInput" type="text" placeholder="e.g. EMEA Team, Bucharest Trip…" maxlength="30">
    <div class="modal-btns">
      <button class="btn-cancel" id="modalCancel">Cancel</button>
      <button class="btn-save" id="modalConfirm">Save</button>
    </div>
  </div>
</div>

// WEEKEND RULES
// Countries where weekend = Fri+Sat
const FRI_SAT_WEEKEND = new Set(['AE','SA','EG','IQ','KW','QA','BH','OM','YE','JO','LY','SD']);
// Countries where weekend = Fri only (some Islamic)
const FRI_ONLY_WEEKEND = new Set(['IR','AF']);
// Israel: Fri+Sat (Shabbat)
const IL_WEEKEND = new Set(['IL']);
// Default: Sat+Sun

function isWeekend(cc, jsDay) {
  // jsDay: 0=Sun,1=Mon,...,5=Fri,6=Sat
  if (FRI_SAT_WEEKEND.has(cc)) return jsDay === 5 || jsDay === 6;
  if (IL_WEEKEND.has(cc)) return jsDay === 5 || jsDay === 6;
  if (FRI_ONLY_WEEKEND.has(cc)) return jsDay === 5;
  return jsDay === 0 || jsDay === 6; // Sat+Sun default
}

function isBankHoliday(cc, date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return BH.has(`${cc}:${y}-${m}-${d}`);
}

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const SK = 'wt_v6';
const VK = 'wt_views_v3';
let cities = [];
let views = {};
let selHour = null;
let dayOff = 0;
let viewsOpen = false;
let activeViewName = null;
let use24h = false;
let ohActive = false;
let ohFrom = 9;
let ohTo = 18;
let homeCityKey = null; // "name|tz"

function load() {
  try { const s = localStorage.getItem(SK); if (s) cities = JSON.parse(s); else cities = defaultCities(); } catch { cities = defaultCities(); }
  try { const v = localStorage.getItem(VK); if (v) views = JSON.parse(v); } catch { views = {}; }
  try { const h = localStorage.getItem('wt_home'); if (h) homeCityKey = h; } catch {}
}
function defaultCities() {
  return ['London','Rome','Amsterdam','New York','Tokyo'].map(n=>ALL.find(c=>c.name===n)).filter(Boolean);
}
function save() { localStorage.setItem(SK, JSON.stringify(cities)); }
function saveViews() { localStorage.setItem(VK, JSON.stringify(views)); }

// ═══════════════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════════════
function refDate() { const d=new Date(); d.setDate(d.getDate()+dayOff); d.setHours(12,0,0,0); return d; }

function localDayForOffset(offset) {
  const d=new Date(); d.setDate(d.getDate()+offset); return d;
}

function tzHourForSlot(tz, slotH) {
  const d=refDate(); d.setHours(slotH,0,0,0);
  const s=d.toLocaleString('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false});
  const p=s.split(':'); return {h:parseInt(p[0])%24,m:parseInt(p[1])};
}

function tzDateForSlot(tz, slotH) {
  const d=refDate(); d.setHours(slotH,0,0,0);
  return new Date(d.toLocaleString('en-US',{timeZone:tz}));
}

function tzOffset(tz) {
  const n=new Date();
  const loc=new Date(n.toLocaleString('en-US',{timeZone:tz}));
  const utc=new Date(n.toLocaleString('en-US',{timeZone:'UTC'}));
  const diff=(loc-utc)/3600000;
  const s=diff>=0?'+':'-'; const a=Math.abs(diff); const h=Math.floor(a); const m=Math.round((a-h)*60);
  return `UTC${s}${h}${m?':'+String(m).padStart(2,'0'):''}`;
}

function cityNow(tz) {
  return new Date().toLocaleString('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:true});
}

function dayBoundaryLabel(tz, slotH) {
  const d=refDate(); d.setHours(slotH,0,0,0);
  const tzD=new Date(d.toLocaleString('en-US',{timeZone:tz}));
  const locD=new Date(d.toLocaleString('en-US',{timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone}));
  tzD.setHours(0,0,0,0); locD.setHours(0,0,0,0);
  const diff=Math.round((tzD-locD)/86400000);
  if(!diff) return null;
  const nd=new Date(d); nd.setDate(nd.getDate()+diff);
  return nd.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function cityKey(c) { return c.name + '|' + c.tz; }

function cellCls(h) {
  if (!ohActive) return h >= 9 && h < 18 ? 'h-work' : 'h-off';
  return h >= ohFrom && h < ohTo ? 'h-work' : 'h-off';
}
function fmtHour(h) {
  if (use24h) return { n: String(h).padStart(2,'0'), ap: '' };
  const ap = h >= 12 ? 'pm' : 'am';
  return { n: String(h % 12 || 12), ap };
}
function cityNowFmt(tz) {
  if (use24h) return new Date().toLocaleString('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:false});
  return new Date().toLocaleString('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',hour12:true});
}



// ═══════════════════════════════════════════════════
// DATE NAV
// ═══════════════════════════════════════════════════
function renderNav() {
  const inn=document.getElementById('dateNavInner');
  inn.innerHTML='';
  const today=new Date();
  for(let i=-1;i<=7;i++){
    const d=new Date(today); d.setDate(d.getDate()+i);
    const dow=d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
    const mon=d.toLocaleDateString('en-US',{month:'short'}).toUpperCase();
    const day=d.getDate();
    const jsDay=d.getDay();
    const anyWk=cities.some(c=>isWeekend(c.cc,jsDay));
    const btn=document.createElement('button');
    btn.className='date-pill'+(i===dayOff?' active':'')+(anyWk&&i!==dayOff?' is-weekend':'');
    btn.innerHTML=i===0
      ?`<span style="font-size:9px;display:block;opacity:.7">${dow}</span><span>Today</span>`
      :`<span style="font-size:9px;display:block;opacity:.7">${dow}</span><span>${mon} ${day}</span>`;
    btn.onclick=()=>{ dayOff=i; selHour=null; renderNav(); renderGrid(); };
    inn.appendChild(btn);
  }
}

// ═══════════════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════════════
document.getElementById('viewsToggle').onclick=()=>{
  viewsOpen=!viewsOpen;
  document.getElementById('viewsBar').classList.toggle('open',viewsOpen);
  renderViewChips();
};

document.getElementById('saveViewBtn').onclick=()=>{
  document.getElementById('viewNameInput').value='';
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('viewNameInput').focus(),100);
};

document.getElementById('modalCancel').onclick=()=>document.getElementById('modalBg').classList.remove('open');

document.getElementById('modalConfirm').onclick=()=>{
  const name=document.getElementById('viewNameInput').value.trim();
  if(!name) return;
  views[name]=cities.map(c=>({name:c.name,tz:c.tz}));
  saveViews();
  activeViewName=name;
  document.getElementById('modalBg').classList.remove('open');
  renderViewChips();
};

document.getElementById('viewNameInput').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('modalConfirm').click(); });
document.getElementById('modalBg').onclick=e=>{ if(e.target===document.getElementById('modalBg')) document.getElementById('modalBg').classList.remove('open'); };

function renderViewChips() {
  const wrap=document.getElementById('viewChips');
  const names=Object.keys(views);
  if(!names.length){wrap.innerHTML='<span style="font-size:11px;color:rgba(255,255,255,0.4);padding:5px 0">No saved views yet</span>';return;}
  wrap.innerHTML=names.map(n=>`
    <span class="view-chip">
      <span class="view-chip-name${n===activeViewName?' active-view':''}" data-vn="${n}">${n}</span>
      <span class="view-chip-link" data-vl="${n}" title="Copia link">🔗</span>
      <span class="view-chip-del" data-vd="${n}">×</span>
    </span>`).join('');
  wrap.querySelectorAll('.view-chip-name').forEach(el=>{
    el.onclick=()=>{
      const vname=el.dataset.vn;
      const v=views[vname]; if(!v)return;
      cities=v.map(vc=>ALL.find(c=>c.name===vc.name&&c.tz===vc.tz)).filter(Boolean);
      activeViewName=vname;
      save(); renderNav(); renderGrid(); renderViewChips();
    };
  });
  wrap.querySelectorAll('.view-chip-link').forEach(el=>{
    el.onclick=e=>{
      e.stopPropagation();
      const vname=el.dataset.vl;
      const v=views[vname]; if(!v)return;
      const encoded=v.map(c=>encodeURIComponent(c.name+'|'+c.tz)).join(',');
      const url=location.href.split('#')[0]+'#view='+encoded;
      navigator.clipboard.writeText(url).then(()=>showToast()).catch(()=>{
        // fallback for non-https (local file)
        const ta=document.createElement('textarea');
        ta.value=url; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta); showToast();
      });
    };
  });
  wrap.querySelectorAll('.view-chip-del').forEach(el=>{
    el.onclick=e=>{
      e.stopPropagation();
      const vname=el.dataset.vd;
      delete views[vname];
      if(activeViewName===vname) activeViewName=null;
      saveViews(); renderViewChips();
    };
  });
}

function showToast() {
  const t=document.getElementById('copyToast');
  t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0', 2000);
}

// ═══════════════════════════════════════════════════
// GRID
// ═══════════════════════════════════════════════════
function renderGrid() {
  const gt=document.getElementById('gt');
  if(!cities.length){
    gt.innerHTML=`<tr><td colspan="25"><div class="empty-hint"><div class="ei">🌍</div>Type a city above to get started.</div></td></tr>`;
    return;
  }

  const curH=dayOff===0?new Date().getHours():12;
  const ah=selHour!==null?selHour:curH;
  const hours=Array.from({length:24},(_,i)=>i);
  const refD=localDayForOffset(dayOff);
  const refLabel=dayOff===0?'Today':refD.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

  let rows='';

  // Sort: home city first
  const sorted = homeCityKey
    ? [...cities].sort((a,b) => (cityKey(a)===homeCityKey ? -1 : cityKey(b)===homeCityKey ? 1 : 0))
    : cities;

  sorted.forEach((city,ci)=>{
    const isHome = cityKey(city) === homeCityKey;
    const origIdx = cities.indexOf(city);
    rows+='<tr>';
    const now=cityNowFmt(city.tz);
    rows+=`<td class="city-cell${isHome?' is-home':''}">
      <div class="city-top">
        <span><span class="cname">${city.flag} ${city.name}</span></span>
        <span style="display:flex;align-items:center;gap:2px">
          <button class="chome-btn${isHome?' active':''}" data-ci="${origIdx}" title="Set as home">🏠</button>
          <button class="cdel" data-ci="${origIdx}">×</button>
        </span>
      </div>
      <div class="ccountry">${city.country}${isHome?' <span class="home-tag">home</span>':''}</div>
      <div class="ctime">${now}</div>
    </td>`;

    let prevLabel=null;
    hours.forEach(slotH=>{
      const {h:ch}=tzHourForSlot(city.tz,slotH);
      const cellDate=tzDateForSlot(city.tz,slotH);
      const jsDay=cellDate.getDay();
      const wk=isWeekend(city.cc,jsDay);
      const bh=isBankHoliday(city.cc,cellDate);
      const cls=cellCls(ch);
      const f=fmtHour(ch);
      const isSel=slotH===ah;

      let wkCls=wk?' is-wk':'';
      let bhCls=bh?' is-bh':'';
      let badges='';
      if(wk||bh){
        badges='<span class="cell-badges">';
        if(wk) badges+='<span class="badge-wk">WK</span>';
        if(bh) badges+='<span class="badge-bh">HOL</span>';
        badges+='</span>';
      }

      const dl=dayBoundaryLabel(city.tz,slotH);
      let bdCls=''; let dtag='';
      if(dl&&dl!==prevLabel){ prevLabel=dl; bdCls=' day-bd'; dtag=`<span class="day-tag-abs">${dl}</span>`; }

      rows+=`<td class="hd-cell ${cls}${wkCls}${bhCls}${isSel?' sel':''}${bdCls}" data-h="${slotH}">${dtag}${badges}<span class="ch">${f.n}</span>${f.ap?`<span class="ca">${f.ap}</span>`:''}</td>`;
    });
    rows+='</tr>';
  });

  gt.innerHTML=rows;

  requestAnimationFrame(()=>{
    const gs=document.getElementById('gs');
    gs.scrollLeft=Math.max(0,200+ah*54-gs.clientWidth/2+27);
  });

  gt.querySelectorAll('.hh-cell').forEach(el=>{ el.onclick=()=>{ selHour=parseInt(el.dataset.h); renderGrid(); }; });
  gt.querySelectorAll('.hd-cell').forEach(el=>{ el.onclick=()=>{ selHour=parseInt(el.dataset.h); renderGrid(); }; });
  gt.querySelectorAll('.chome-btn').forEach(btn=>{
    btn.onclick=e=>{ e.stopPropagation();
      const city=cities[parseInt(btn.dataset.ci)];
      const key=cityKey(city);
      homeCityKey = homeCityKey===key ? null : key;
      localStorage.setItem('wt_home', homeCityKey||'');
      renderGrid();
    };
  });
  gt.querySelectorAll('.cdel').forEach(btn=>{
    btn.onclick=e=>{ e.stopPropagation(); cities.splice(parseInt(btn.dataset.ci),1); save(); renderGrid(); };
  });
}

// ═══════════════════════════════════════════════════
// SEARCH  (fixed: using proper event on text input)
// ═══════════════════════════════════════════════════
const si=document.getElementById('si');
const dd=document.getElementById('dd');

function doSearch() {
  const q=si.value.trim().toLowerCase();
  if(!q){ dd.classList.remove('open'); return; }
  const added=new Set(cities.map(c=>c.name+'|'+c.tz));
  const res=ALL.filter(c=>
    !added.has(c.name+'|'+c.tz) &&
    (c.name.toLowerCase().includes(q)||c.country.toLowerCase().includes(q)||c.tz.toLowerCase().includes(q))
  ).slice(0,30);

  if(!res.length){
    dd.innerHTML=`<div class="drop-item"><div><div class="drop-name" style="color:#999">No results for "${si.value}"</div></div></div>`;
  } else {
    dd.innerHTML=res.map((c,i)=>`
      <div class="drop-item" data-i="${i}">
        <span class="drop-flag">${c.flag}</span>
        <div><div class="drop-name">${c.name}</div><div class="drop-country">${c.country} · ${c.tz}</div></div>
      </div>`).join('');
    dd.querySelectorAll('.drop-item').forEach(el=>{
      el.addEventListener('mousedown', e=>{
        e.preventDefault();
        const city=res[parseInt(el.dataset.i)];
        cities.push(city); save();
        si.value=''; dd.classList.remove('open');
        renderNav(); renderGrid();
      });
    });
  }
  dd.classList.add('open');
}

si.addEventListener('input', doSearch);
si.addEventListener('focus', doSearch);
si.addEventListener('blur', ()=>{ setTimeout(()=>dd.classList.remove('open'), 150); });

ohToSel.onchange = () => { ohTo = parseInt(ohToSel.value); renderGrid(); };

// ── LOAD FROM URL HASH (shared view link) ──
function loadFromHash() {
  const hash = location.hash;
  if (!hash.startsWith('#view=')) return false;
  try {
    const encoded = hash.slice(6).split(',');
    const loaded = encoded.map(part => {
      const [name, tz] = decodeURIComponent(part).split('|');
      return ALL.find(c => c.name === name && c.tz === tz);
    }).filter(Boolean);
    if (loaded.length) { cities = loaded; save(); return true; }
  } catch(e) {}
  return false;
}

load();
loadFromHash();
renderNav();
renderGrid();
renderViewChips();
